<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>즐거운영상</title>
    <style>
        /* 페이지 전체에 회색 그라데이션 배경 적용 */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #d1d5db 0%, #9ca3af 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 { color: #374151; }
        
        .code-box {
            background: #1f2937;
            color: #f3f4f6;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .video-wrapper {
            margin-top: 20px;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>즐거운영상</h1>
        
        <div class="code-box">python -m http.server</div>
        
        <a href="http://llm.pocheonil.hs.kr" target="_blank" style="font-size: 1.2em; color: #2563eb;">llm.pocheonil.hs.kr 바로가기</a>

        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/LiBrRUO6PfI" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
